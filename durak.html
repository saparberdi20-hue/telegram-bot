<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durak O'yini</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:radial-gradient(ellipse at center,#1b6b3a 0%,#0d3d20 70%,#071f10 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;gap:10px}
.menu{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;min-height:500px;width:100%}
.menu-title{color:#f0d060;font-size:28px;font-weight:700;text-align:center}
.menu-btn{width:280px;padding:18px 24px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:12px}
.btn-bot{background:#4ade80;color:#0d2b1a}
.btn-multi{background:#60a5fa;color:#0d1f4a}
.menu-icon{font-size:28px}
.mbt{display:flex;flex-direction:column;align-items:flex-start}
.mbl{font-size:16px;font-weight:700}
.mbd{font-size:12px;opacity:0.8;font-weight:400}
.top-bar{display:flex;gap:12px;background:rgba(0,0,0,0.4);padding:8px 20px;border-radius:20px;width:100%;max-width:620px;justify-content:center}
.score{color:#f0d060;font-size:12px;text-align:center}
.score b{display:block;font-size:18px;color:#fff}
.card{width:50px;height:74px;background:#fff;border-radius:6px;border:1.5px solid #ccc;box-shadow:2px 4px 8px rgba(0,0,0,0.4);display:flex;flex-direction:column;justify-content:space-between;padding:4px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;user-select:none}
.card:hover{transform:translateY(-6px) scale(1.06)}
.card.selected{transform:translateY(-10px) scale(1.08);box-shadow:0 0 0 3px #f0d060}
.card.playable{box-shadow:0 0 0 2px #4ade80,2px 4px 8px rgba(0,0,0,0.4)}
.card.back{background:repeating-linear-gradient(45deg,#1a3a8a,#1a3a8a 5px,#c0392b 5px,#c0392b 10px);border:2px solid #0d1f4a;cursor:default}
.cv{font-size:12px;font-weight:700;line-height:1}
.cs{font-size:15px;text-align:center}
.cvb{font-size:12px;font-weight:700;line-height:1;transform:rotate(180deg);align-self:flex-end}
.red{color:#c0392b}.black{color:#1a1a1a}
.felt{width:100%;max-width:620px;min-height:150px;background:#155228;border-radius:16px;border:6px solid #8B6914;padding:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;position:relative}
.felt-label{position:absolute;top:6px;left:10px;color:rgba(255,255,255,0.3);font-size:11px}
.hand-area{width:100%;max-width:620px;background:rgba(0,0,0,0.3);border-radius:12px;padding:12px}
.hand-label{color:#a0d0a0;font-size:12px;margin-bottom:8px}
.hand-tiles{display:flex;flex-wrap:wrap;gap:5px}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:transform 0.1s}
.btn:active{transform:scale(0.96)}
.btn-green{background:#4ade80;color:#0d2b1a}
.btn-red{background:#f87171;color:#2b0000}
.btn-yellow{background:#f0d060;color:#2b1a00}
.btn-gray{background:rgba(255,255,255,0.2);color:#fff}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.bot-area{width:100%;max-width:620px;background:rgba(0,0,0,0.2);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:8px}
.trump-area{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.3);padding:6px 14px;border-radius:10px}
.trump-label{color:#f0d060;font-size:12px}
.status{color:#fff;font-size:13px;text-align:center;background:rgba(0,0,0,0.35);padding:8px 16px;border-radius:10px;width:100%;max-width:620px;min-height:36px}
.phase-badge{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;margin-left:auto}
.attack-badge{background:#f0d060;color:#2b1a00}
.defend-badge{background:#f87171;color:#2b0000}
</style>
</head>
<body>

<div id="menu" class="menu">
  <div class="menu-title">🃏 DURAK</div>
  <p style="color:#a0d0a0;font-size:14px">O'yin turini tanlang</p>
  <button class="menu-btn btn-bot" onclick="startBot()">
    <div class="menu-icon">🤖</div>
    <div class="mbt"><div class="mbl">Botga qarshi</div><div class="mbd">Sun'iy intellektga qarshi</div></div>
  </button>
  <button class="menu-btn btn-multi" onclick="alert('Bu funksiya Telegram orqali ishlaydi!')">
    <div class="menu-icon">👥</div>
    <div class="mbt"><div class="mbl">2 kishi birga</div><div class="mbd">Do\'stingiz bilan online</div></div>
  </button>
</div>

<div id="game" style="display:none;width:100%;flex-direction:column;align-items:center;gap:10px"></div>

<script>
const SUITS=['♠','♥','♦','♣'];
const VALS=['6','7','8','9','10','J','Q','K','A'];
const RED=new Set(['♥','♦']);
function vi(v){return VALS.indexOf(v);}

function makeDeck(){
  let d=[];
  SUITS.forEach(s=>VALS.forEach(v=>d.push({s,v})));
  return d.sort(()=>Math.random()-0.5);
}

function cardEl(c,idx,clickable){
  const el=document.createElement('div');
  el.className='card'+(clickable?' playable':'');
  if(clickable) el.onclick=()=>selectCard(idx);
  const col=RED.has(c.s)?'red':'black';
  el.innerHTML=`<div class="cv ${col}">${c.v}${c.s}</div><div class="cs ${col}">${c.s}</div><div class="cvb ${col}">${c.v}${c.s}</div>`;
  return el;
}

function backCard(){
  const el=document.createElement('div');
  el.className='card back';
  return el;
}

function canAttack(c){
  if(board.length===0) return true;
  return [...board,...bdef].some(b=>b.v===c.v);
}

function canDefend(def,atk){
  if(def.s===atk.s&&vi(def.v)>vi(atk.v)) return true;
  if(def.s===ts&&atk.s!==ts) return true;
  return false;
}

let deck,pHand,bHand,trump,ts,board,bdef,selected,turnNum,attacker,busy;

function startBot(){
  deck=makeDeck();
  pHand=deck.splice(0,6);
  bHand=deck.splice(0,6);
  trump=deck[deck.length-1];
  ts=trump.s;
  board=[];bdef=[];selected=null;turnNum=1;
  attacker='player';busy=false;

  document.getElementById('menu').style.display='none';
  const g=document.getElementById('game');
  g.style.display='flex';
  g.innerHTML=`
    <div class="top-bar">
      <div class="score">Sizda<b id="pc">6</b></div>
      <div class="score">Tur<b id="tn">1</b></div>
      <div class="score">Botda<b id="bc">6</b></div>
      <div class="score">Qoldi<b id="dc">24</b></div>
    </div>
    <div class="bot-area">
      <div style="font-size:22px">🤖</div>
      <div style="color:#c0e0c0;font-size:13px">Bot: <b id="bc2">6</b> ta karta</div>
      <div id="oc" style="display:flex;gap:3px;margin-left:auto"></div>
      <div id="pb" class="phase-badge attack-badge">Siz uring</div>
    </div>
    <div class="trump-area">
      <div class="trump-label">Kozir:</div>
      <div id="td"></div>
      <div class="trump-label" id="tsl"></div>
    </div>
    <div class="felt">
      <div class="felt-label">Stol</div>
      <div id="bd" style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center"></div>
    </div>
    <div class="hand-area">
      <div class="hand-label" id="hl">Sizning qo'lingiz:</div>
      <div class="hand-tiles" id="hc"></div>
      <div class="btn-row">
        <button class="btn btn-green" id="ba" onclick="doAttack()">Ur</button>
        <button class="btn btn-green" id="bd2" onclick="doDefend()">Himoya qilish</button>
        <button class="btn btn-yellow" id="bt" onclick="doTake()">Kartalarni ol</button>
        <button class="btn btn-red" id="be" onclick="doEnd()">Turni tugat</button>
        <button class="btn btn-gray" onclick="goMenu()">Menyu</button>
      </div>
    </div>
    <div class="status" id="st">O'yin boshlandi! Siz birinchi uring.</div>
  `;
  render();updateBtns();
}

function goMenu(){
  document.getElementById('game').style.display='none';
  document.getElementById('game').innerHTML='';
  document.getElementById('menu').style.display='flex';
}

function drawCards(){
  if(attacker==='player'){
    while(pHand.length<6&&deck.length) pHand.push(deck.pop());
    while(bHand.length<6&&deck.length) bHand.push(deck.pop());
  } else {
    while(bHand.length<6&&deck.length) bHand.push(deck.pop());
    while(pHand.length<6&&deck.length) pHand.push(deck.pop());
  }
}

function render(){
  if(!document.getElementById('pc')) return;
  document.getElementById('pc').textContent=pHand.length;
  document.getElementById('bc').textContent=bHand.length;
  document.getElementById('bc2').textContent=bHand.length;
  document.getElementById('tn').textContent=turnNum;
  document.getElementById('dc').textContent=deck.length;

  const td=document.getElementById('td');
  td.innerHTML='';
  td.appendChild(cardEl(trump,null,false));
  document.getElementById('tsl').textContent=ts+' kozir';

  const oc=document.getElementById('oc');
  oc.innerHTML='';
  bHand.slice(0,8).forEach(()=>oc.appendChild(backCard()));

  const pb=document.getElementById('pb');
  if(attacker==='player'){
    pb.className='phase-badge attack-badge';
    pb.textContent='Siz uring';
  } else {
    pb.className='phase-badge defend-badge';
    pb.textContent='Bot ururdi';
  }

  const hl=document.getElementById('hl');
  hl.textContent=attacker==='player'?'Sizning qo\'lingiz (Siz uring):':'Sizning qo\'lingiz (Himoya qiling):';

  const hc=document.getElementById('hc');
  hc.innerHTML='';
  pHand.forEach((c,i)=>{
    let ok=false;
    if(attacker==='player') ok=canAttack(c);
    else ok=board.length>bdef.length&&canDefend(c,board[bdef.length]);
    const el=cardEl(c,i,ok);
    if(selected===i) el.classList.add('selected');
    hc.appendChild(el);
  });

  const bd=document.getElementById('bd');
  bd.innerHTML='';
  board.forEach((c,i)=>{
    bd.appendChild(cardEl(c,null,false));
    if(bdef[i]){
      const def=cardEl(bdef[i],null,false);
      def.style.marginLeft='-18px';
      def.style.marginTop='8px';
      bd.appendChild(def);
    }
  });
}

function selectCard(i){
  if(busy) return;
  selected=(selected===i)?null:i;
  render();
}

function updateBtns(){
  if(!document.getElementById('ba')) return;
  document.getElementById('ba').disabled=attacker!=='player'||busy;
  document.getElementById('bd2').disabled=attacker!=='bot'||board.length===0||board.length<=bdef.length||busy;
  document.getElementById('bt').disabled=attacker!=='bot'||board.length===0||busy;
  document.getElementById('be').disabled=attacker!=='player'||board.length===0||busy;
}

function checkWin(){
  if(!pHand.length){
    setSt('🏆 TABRIKLAYMAN! Siz g\'olib bo\'ldingiz! 🎉');
    disableAll();return true;
  }
  if(!bHand.length){
    setSt('😔 Bot g\'olib bo\'ldi! Qayta urinish uchun Menyu bosing.');
    disableAll();return true;
  }
  return false;
}

function disableAll(){
  ['ba','bd2','bt','be'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.disabled=true;
  });
}

function doAttack(){
  if(busy||selected===null){setSt('Karta tanlang!');return;}
  const c=pHand[selected];
  if(!canAttack(c)){setSt('Bu kartani qo\'yib bo\'lmaydi!');return;}
  board.push(pHand.splice(selected,1)[0]);
  selected=null;busy=true;
  render();updateBtns();
  setSt('Karta qo\'ydingiz! Bot himoya qilmoqda...');
  setTimeout(botDefend,900);
}

function botDefend(){
  const atk=board[bdef.length];
  if(!atk){busy=false;render();updateBtns();return;}
  let defCard=null;
  for(let i=0;i<bHand.length;i++){
    if(canDefend(bHand[i],atk)){
      defCard=bHand.splice(i,1)[0];break;
    }
  }
  if(!defCard){
    bHand.push(...board,...bdef);
    board=[];bdef=[];
    while(pHand.length<6&&deck.length) pHand.push(deck.pop());
    busy=false;
    setSt('Bot himoya qila olmadi — kartalarni oldi! Siz YANA uring.');
    render();updateBtns();
    checkWin();
  } else {
    bdef.push(defCard);
    busy=false;
    setSt('Bot himoya qildi! Yana uring yoki "Turni tugat" bosing.');
    render();updateBtns();
    checkWin();
  }
}

function doDefend(){
  if(busy||selected===null){setSt('Karta tanlang!');return;}
  const atk=board[bdef.length];
  if(!atk){setSt('Himoya shart emas!');return;}
  const c=pHand[selected];
  if(!canDefend(c,atk)){setSt('Bu karta bilan himoya qilib bo\'lmaydi!');return;}
  bdef.push(pHand.splice(selected,1)[0]);
  selected=null;
  if(bdef.length===board.length){
    busy=true;render();updateBtns();
    setTimeout(()=>{
      const possible=bHand.filter(c=>[...board,...bdef].some(b=>b.v===c.v));
      if(possible.length>0&&board.length<6){
        const c2=possible.sort((a,b)=>{
          if(a.s===ts&&b.s!==ts) return 1;
          if(b.s===ts&&a.s!==ts) return -1;
          return vi(a.v)-vi(b.v);
        })[0];
        bHand.splice(bHand.indexOf(c2),1);
        board.push(c2);
        busy=false;
        setSt(`Bot ${c2.v}${c2.s} qo'shdi! Himoya qiling yoki "Kartalarni ol" bosing.`);
        render();updateBtns();
      } else {
        board=[];bdef=[];
        attacker='player';turnNum++;
        drawCards();busy=false;
        setSt('Bot yana ura olmadi — tur tugadi! Endi SIZ uring.');
        render();updateBtns();
        checkWin();
      }
    },700);
  } else {render();updateBtns();}
}

function doTake(){
  if(busy) return;
  pHand.push(...board,...bdef);
  board=[];bdef=[];
  while(bHand.length<6&&deck.length) bHand.push(deck.pop());
  busy=true;
  setSt('Kartalarni oldingiz. Bot yana ururdi...');
  render();updateBtns();
  setTimeout(botStartAttack,1000);
}

function doEnd(){
  if(busy) return;
  board=[];bdef=[];
  attacker='bot';turnNum++;
  drawCards();busy=true;
  setSt('Tur tugadi! Bot endi ururdi...');
  render();updateBtns();
  setTimeout(botStartAttack,1000);
  checkWin();
}

function botStartAttack(){
  if(!bHand.length){busy=false;checkWin();return;}
  const sorted=[...bHand].sort((a,b)=>{
    if(a.s===ts&&b.s!==ts) return 1;
    if(b.s===ts&&a.s!==ts) return -1;
    return vi(a.v)-vi(b.v);
  });
  const c=sorted[0];
  bHand.splice(bHand.indexOf(c),1);
  board.push(c);attacker='bot';busy=false;
  setSt(`Bot ${c.v}${c.s} tashladi! Himoya qiling yoki "Kartalarni ol" bosing.`);
  render();updateBtns();
}

function setSt(msg){const el=document.getElementById('st');if(el)el.textContent=msg;}
</script>
</body>
</html>
